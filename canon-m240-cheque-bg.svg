<svg xmlns="http://www.w3.org/2000/svg" width="794" height="560" viewBox="0 0 794 560">
  <!-- Background -->
  <rect width="794" height="560" fill="#ffffff"/>
  
  <!-- Security pattern - simple grid for generic cheque -->
  <defs>
    <pattern id="canon-pattern" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="15" height="15" fill="none" stroke="#333333" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  
  <rect width="794" height="560" fill="url(#canon-pattern)"/>
  
  <!-- Generic Bank Logo Area -->
  <rect x="30" y="25" width="200" height="50" fill="#333333" rx="5"/>
  <text x="45" y="58" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">BANK NAME</text>
  
  <!-- MICR Band at bottom -->
  <rect x="0" y="520" width="794" height="40" fill="#f5f5f5"/>
  <text x="30" y="545" font-family="Courier New, monospace" font-size="14" fill="#333">⑆00000000000⑆ BANK0000000 ⑈000000000000⑈</text>
  
  <!-- Date field boxes (top right) -->
  <text x="580" y="45" font-family="Arial, sans-serif" font-size="12" fill="#666">Date</text>
  <rect x="580" y="50" width="30" height="25" fill="none" stroke="#333333" stroke-width="1.5"/>
  <rect x="615" y="50" width="30" height="25" fill="none" stroke="#333333" stroke-width="1.5"/>
  <rect x="650" y="50" width="30" height="25" fill="none" stroke="#333333" stroke-width="1.5"/>
  <text x="585" y="68" font-family="Arial, sans-serif" font-size="10" fill="#999">DD</text>
  <text x="620" y="68" font-family="Arial, sans-serif" font-size="10" fill="#999">MM</text>
  <text x="655" y="68" font-family="Arial, sans-serif" font-size="10" fill="#999">YYYY</text>
  
  <!-- Pay field -->
  <text x="30" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Pay</text>
  <line x1="70" y1="105" x2="650" y2="105" stroke="#333333" stroke-width="1"/>
  <text x="680" y="110" font-family="Arial, sans-serif" font-size="12" fill="#666">Or Bearer</text>
  <text x="680" y="125" font-family="Arial, sans-serif" font-size="10" fill="#999">या धारक को</text>
  
  <!-- Rupees field -->
  <text x="30" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Rupees</text>
  <line x1="90" y1="145" x2="550" y2="145" stroke="#333333" stroke-width="1"/>
  <text x="560" y="150" font-family="Arial, sans-serif" font-size="12" fill="#666">रुपये</text>
  
  <!-- Amount box (right side) -->
  <rect x="600" y="125" width="150" height="40" fill="none" stroke="#333333" stroke-width="2"/>
  <text x="620" y="150" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">₹</text>
  
  <!-- Account number field -->
  <rect x="30" y="420" width="180" height="30" fill="none" stroke="#333333" stroke-width="1"/>
  <text x="40" y="440" font-family="Arial, sans-serif" font-size="10" fill="#666">A/c No.</text>
  <text x="40" y="455" font-family="Arial, sans-serif" font-size="9" fill="#999">खाता नं.</text>
  
  <!-- Generic branding -->
  <text x="250" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">GENERIC BANK</text>
  <text x="370" y="440" font-family="Arial, sans-serif" font-size="11" fill="#666">Branch Name</text>
  
  <!-- Bottom text -->
  <text x="30" y="480" font-family="Arial, sans-serif" font-size="9" fill="#666">Payable at par at all branches</text>
  
  <!-- Signature area -->
  <text x="580" y="470" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Authorised Signatories</text>
  <text x="580" y="485" font-family="Arial, sans-serif" font-size="9" fill="#999">Please sign above if not already done</text>
  <line x1="580" y1="495" x2="750" y2="495" stroke="#333333" stroke-width="1"/>
  
  <!-- "And" text in Hindi -->
  <text x="540" y="150" font-family="Arial, sans-serif" font-size="12" fill="#666">अर्थात</text>
  
  <!-- Security watermark -->
  <text x="300" y="300" font-family="Arial, sans-serif" font-size="60" fill="#333333" opacity="0.03" transform="rotate(-30 300 300)">CHEQUE</text>
  
  <!-- Cheque number -->
  <text x="700" y="30" font-family="Courier New, monospace" font-size="11" fill="#666">000000</text>
  
  <!-- IFSC Code -->
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="10" fill="#666">IFSC: BANK0000000</text>
  
  <!-- Canon M-240 Printer label -->
  <text x="650" y="550" font-family="Arial, sans-serif" font-size="9" fill="#999">Canon M-240 Compatible</text>
</svg>
